<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>带心跳的不掉线计数器</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; }
        #status { padding: 10px 20px; border-radius: 20px; display: inline-block; }
        .online  { background: #4caf50; color: white; }
        .offline { background: #f44336; color: white; }
        #number { font-size: 80px; margin: 30px 0; font-weight: bold; color: #2196F3; }
        #log { margin-top: 30px; color: #666; font-size: 14px;
               border-top: 1px solid #ccc; padding-top: 20px;
               max-height: 200px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <h2>📊 带心跳的不掉线计数器</h2>
    <div id="status" class="online">🟢 已连接 (心跳正常)</div>
    <div id="number">0</div>
    <div style="color: #999; font-size: 14px;">
        每 2 秒更新 · 后台心跳探测 · 断线自动重连 · 断线续传
    </div>
    <div id="log">系统日志：初始化完成</div>

    <script>
        let ws = null, reconnectTimer = null, attempts = 0;
        const statusEl = document.getElementById('status');
        const numberEl = document.getElementById('number');
        const logEl = document.getElementById('log');

        function addLog(msg) {
            const t = new Date().toLocaleTimeString();
            logEl.innerHTML += `<br>${t} - ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(online) {
            if (online) {
                statusEl.textContent = '🟢 已连接 (心跳正常)';
                statusEl.className = 'online';
            } else {
                statusEl.textContent = `🔴 断开 (${attempts}s 后重试)`;
                statusEl.className = 'offline';
            }
        }

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            addLog('正在连接...');
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                addLog('✅ 连接成功，心跳已启动');
                attempts = 0; setStatus(true);
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onmessage = (event) => {
                try {
                    const d = JSON.parse(event.data);
                    if (d.type === 'counter') { numberEl.textContent = d.payload; setStatus(true); }
                } catch (e) {}
            };

            ws.onclose = () => {
                addLog('❌ 连接断开'); setStatus(false);
                const delay = Math.min(1000 * Math.pow(2, attempts), 30000);
                attempts++;
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => { addLog(`⏳ 第 ${attempts} 次重连...`); connect(); }, delay);
            };

            ws.onerror = (e) => console.error('WS 错误:', e);
        }

        window.onload = connect;
        window.onbeforeunload = () => {
            if (ws) ws.close();
            if (reconnectTimer) clearTimeout(reconnectTimer);
        };
    </script>
</body>
</html>
