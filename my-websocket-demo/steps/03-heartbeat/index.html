<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>带心跳的不掉线计数器</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; }
        #status { padding: 10px 20px; border-radius: 20px; display: inline-block; }
        .online  { background: #4caf50; color: white; }
        .offline { background: #f44336; color: white; }
        #number {
            font-size: 80px; margin: 30px 0; font-weight: bold; color: #2196F3;
        }
        #log {
            margin-top: 30px; color: #666; font-size: 14px;
            border-top: 1px solid #ccc; padding-top: 20px;
            max-height: 200px; overflow-y: auto; text-align: left;
        }
    </style>
</head>
<body>
    <h2>📊 带心跳的计数器</h2>
    <div id="status" class="online">🟢 已连接 (心跳正常)</div>
    <div id="number">0</div>
    <div style="color: #999; font-size: 14px;">
        （每 2 秒更新 · 后台自动心跳探测 · 断线自动重连）
    </div>
    <div id="log">系统日志：初始化完成</div>

    <script>
        /**
         * 本步骤核心知识点（对比 Step 1）：
         *   - 服务端 ws.ping() 发送 Ping 帧，浏览器自动回复 Pong
         *   - 前端无需写心跳代码 —— 协议层自动完成
         *   - 服务端 5 秒扫荡一次 "僵尸连接"（isAlive === false → terminate）
         *   - 断线重连后，服务端立刻下发最新 counter → 断线续传
         */

        let ws = null;
        let reconnectTimer = null;
        let attempts = 0;

        const statusEl = document.getElementById('status');
        const numberEl = document.getElementById('number');
        const logEl   = document.getElementById('log');

        // ---------- 工具函数 ----------

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<br>${time} - ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(online) {
            if (online) {
                statusEl.textContent = '🟢 已连接 (心跳正常)';
                statusEl.className   = 'online';
            } else {
                statusEl.textContent = `🔴 断开连接 (${attempts}s 后重试)`;
                statusEl.className   = 'offline';
            }
        }

        // ---------- 核心：建立连接 ----------

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) return;

            addLog('正在连接服务器...');
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = function () {
                addLog('✅ 连接成功，心跳探测已启动');
                attempts = 0;
                setStatus(true);
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            ws.onmessage = function (event) {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'counter') {
                        numberEl.textContent = data.payload;
                        setStatus(true);
                    }
                } catch (e) { /* 忽略非 JSON 数据 */ }
            };

            ws.onclose = function () {
                addLog('❌ 连接断开');
                setStatus(false);

                // 指数退避重连
                const delay = Math.min(1000 * Math.pow(2, attempts), 30000);
                attempts++;

                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    addLog(`⏳ 尝试第 ${attempts} 次重连...`);
                    connect();
                }, delay);
            };

            ws.onerror = function (err) {
                console.error('WebSocket 错误:', err);
            };
        }

        // ---------- 生命周期 ----------

        window.onload = connect;

        window.onbeforeunload = function () {
            if (ws) ws.close();
            if (reconnectTimer) clearTimeout(reconnectTimer);
        };
    </script>
</body>
</html>
