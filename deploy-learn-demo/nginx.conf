# events 块：定义 Nginx 的工作模式（连接处理方式）
events {
    # 这里留空，使用 Nginx 默认设置就够了
    # 常见配置示例：worker_connections 1024; （每个 worker 进程能处理多少并发连接）
}

# http 块：所有 HTTP 相关的配置都在这里
http {
    # server 块：代表一个虚拟主机（可以有多个 server 块，实现一个 Nginx 跑多个网站）
    server {
        # 监听的端口
        listen 80;
        
        # 匹配的域名（本地测试用 localhost，生产环境换成你的域名）
        server_name localhost;

        # 静态文件根目录（Nginx 从这里找网页文件）
        root /usr/share/nginx/html;
        
        # 默认访问的文件名（用户不写文件名时自动找 index.html）
        index index.html;

        # ==================== 静态资源处理 ====================
        # location / 表示匹配所有请求（根路径）
        location / {
            # try_files 按顺序尝试以下文件/目录
            # $uri     → 当前请求的路径（如 /about）
            # $uri/    → 当前路径加斜杠（当作目录）
            # /index.html → 如果上面都找不到，就回退到 index.html（支持 SPA 单页应用）
            try_files $uri $uri/ /index.html;
        }

        # ==================== API 反向代理 ====================
        # location /api/ 表示所有以 /api/ 开头的请求都走这里
        location /api/ {
            # 把请求转发给后端服务
            # http://backend:3000 是 docker-compose 中后端服务的名字和端口
            proxy_pass http://backend:3000/;
            
            # 以下是常用代理头设置，非常重要
            proxy_set_header Host $host;           # 把原始域名传给后端
            proxy_set_header X-Real-IP $remote_addr; # 把客户端真实 IP 传给后端
            # 常用补充（建议加上）：
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}