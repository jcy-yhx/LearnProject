version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend        # ← 关键：明确指定构建 frontend 阶段
      args:
        ENV: dev
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend         # ← 明确指定 backend 阶段
    environment:
      - ENV=dev